<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Pokédex Guess Game</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div id="mainMenu" class="menu">

<h1>Pokédex Guess Game</h1>

<button onclick="startGame()">🎮 Jouer</button>

</div>


<div id="game" class="hidden">

<h2>Who's that Pokémon?</h2>

<div class="controls">
<div id="genSelector" class="gens">

<label><input type="checkbox" value="1" checked> Gen1</label>
<label><input type="checkbox" value="2" checked> Gen2</label>
<label><input type="checkbox" value="3" checked> Gen3</label>
<label><input type="checkbox" value="4" checked> Gen4</label>
<label><input type="checkbox" value="5" checked> Gen5</label>
<label><input type="checkbox" value="6" checked> Gen6</label>
<label><input type="checkbox" value="7" checked> Gen7</label>
<label><input type="checkbox" value="8" checked> Gen8</label>
<label><input type="checkbox" value="9" checked> Gen9</label>

</div>

<select id="mode">

<option value="silhouette">Silhouette</option>
<option value="back">Sprite dos</option>
<option value="types">Types</option>
<option value="compare">Comparaison</option>

</select>

<select id="language">

<option value="fr">FR</option>
<option value="en">EN</option>

</select>

<label>
<input type="checkbox" id="hardMode">
Hard mode
</label>

</div>


<div class="screen">

<img id="sprite">

<div id="hints"></div>

<div id="compare"></div>

</div>


<div class="guessBox">

<input id="guess" placeholder="Nom du Pokémon" autocomplete="off">

<div id="suggestions" class="suggestions"></div>

<button id="validateBtn">OK</button>
<button id="skipBtn">Skip</button>

</div>


<div id="result"></div>

<div id="score">Score: 0</div>

<div id="streak">Streak: 0</div>

<button onclick="backToMenu()">Retour menu</button>

</div>


<script src="app.js"></script>

</body>
</html>
