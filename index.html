<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Pokédex Guess Game</title>

<link rel="stylesheet" href="style.css">
<link rel="manifest" href="pwa/manifest.json">

<meta name="theme-color" content="#d32f2f">

</head>

<body>

<div id="mainMenu" class="menu">

<h1>Pokédex Guess Game</h1>

<button onclick="startGame()">Jouer</button>
<button onclick="showLeaderboard()">Leaderboard</button>

</div>


<div id="game" class="hidden">

<h2>Who's that Pokémon?</h2>

<div class="controls">

<select id="mode">
<option value="silhouette">Silhouette</option>
<option value="back">Sprite dos</option>
<option value="types">Types + couleurs</option>
<option value="pokedex">Description Pokédex</option>
<option value="compare">Comparaison</option>
</select>

<select id="language">
<option value="fr">FR</option>
<option value="en">EN</option>
</select>

</div>


<div class="screen">

<img id="sprite">

<div id="hints"></div>
<div id="compare"></div>

</div>


<div>

<input id="guess" placeholder="Nom du Pokémon">
<button id="validateBtn">OK</button>
<button id="skipBtn">Skip</button>

</div>


<div id="score">Score: 0</div>
<div id="streak">Streak: 0</div>

<button onclick="backToMenu()">Retour menu</button>

</div>

<script src="app.js"></script>

</body>
</html>
