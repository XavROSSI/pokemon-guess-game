<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Pokédex Guess Game</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- MENU PRINCIPAL -->

<div id="mainMenu" class="menu">

<h1>Pokédex Guess Game</h1>

<button onclick="startGame()">🎮 Jouer</button>
<button onclick="openOptions()">⚙ Options</button>

</div>


<!-- MENU OPTIONS -->

<div id="optionsMenu" class="menu hidden">

<h2>Options</h2>

<h3>Langue</h3>

<select id="languageOption">
<option value="fr">Français</option>
<option value="en">English</option>
</select>


<h3>Générations</h3>

<div id="genSelector">

<label><input type="checkbox" value="1"> Gen1</label>
<label><input type="checkbox" value="2"> Gen2</label>
<label><input type="checkbox" value="3"> Gen3</label>
<label><input type="checkbox" value="4"> Gen4</label>
<label><input type="checkbox" value="5"> Gen5</label>
<label><input type="checkbox" value="6"> Gen6</label>
<label><input type="checkbox" value="7"> Gen7</label>
<label><input type="checkbox" value="8"> Gen8</label>
<label><input type="checkbox" value="9"> Gen9</label>

</div>


<label>
<input type="checkbox" id="hardModeOption">
Hard mode
</label>

<br><br>

<button onclick="saveOptions()">💾 Sauvegarder</button>
<button onclick="closeOptions()">⬅ Retour</button>

</div>


<!-- JEU -->

<div id="game" class="hidden">

<h2>Who's that Pokémon?</h2>

<select id="mode">

<option value="silhouette">Silhouette</option>
<option value="back">Sprite dos</option>
<option value="types">Types</option>
<option value="compare">Comparaison</option>

</select>


<div class="screen">

<img id="sprite">

<div id="hints"></div>
<div id="compare"></div>

</div>


<div class="guessBox">

<input id="guess" placeholder="Nom du Pokémon" autocomplete="off">

<div id="suggestions" class="suggestions"></div>

<button id="validateBtn">OK</button>
<button id="skipBtn">Skip</button>

</div>


<div id="result"></div>

<div id="score">Score: 0</div>
<div id="streak">Streak: 0</div>
<button onclick="resetScore()">Reset score</button>

<button onclick="backToMenu()">⬅ Retour menu</button>

</div>

<script src="app.js"></script>

</body>
</html>
