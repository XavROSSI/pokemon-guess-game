<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Who's that Pokémon</title>
<style>
body{
font-family:Verdana,Arial;
background:#d32f2f;
margin:0;
padding:10px;
color:white;
text-align:center
}

.pokedex{
background:#ef5350;
padding:15px;
border-radius:15px;
max-width:500px;
margin:auto;
box-shadow:0 10px 25px rgba(0,0,0,0.4)
}

.screen{
background:#111;
padding:20px;
border-radius:10px;
margin-bottom:15px
}

#sprite{
image-rendering:pixelated;
width:180px;
height:180px;
filter:brightness(0)
}

.controls{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:8px;
margin-bottom:10px
}

input,button,select{
padding:10px;
font-size:16px;
border-radius:6px;
border:none
}

button{cursor:pointer}

.genBox{
background:#c62828;
padding:5px 8px;
border-radius:6px
}

#result{margin-top:10px;font-weight:bold}

#score{margin-top:5px}

#leaderboard{
margin-top:20px;
background:#b71c1c;
padding:10px;
border-radius:10px
}

#leaderboard ol{
text-align:left;
max-width:250px;
margin:auto
}

.timer{
font-size:18px;
margin-bottom:5px
}

</style>
</head>
<body>

<div class="pokedex">

<h2>Who's that Pokémon?</h2>

<div class="screen">
<img id="sprite" />
</div>

<div class="controls">
<select id="language">
<option value="fr">FR</option>
<option value="en">EN</option>
<option value="de">DE</option>
<option value="es">ES</option>
<option value="it">IT</option>
<option value="ja">JP</option>
<option value="ko">KR</option>
</select>

<label><input type="checkbox" id="progressive"> Reveal progressif</label>
<label><input type="checkbox" id="chrono"> Mode chrono</label>
</div>

<div class="controls" id="genSelector"></div>

<div class="timer" id="timer"></div>

<div>
<input id="guess" placeholder="Nom du Pokémon">
<button onclick="checkAnswer()">OK</button>
<button onclick="nextPokemon()">Skip</button>
</div>

<div id="result"></div>
<div id="score">Score: 0</div>
<div id="streak">Streak: 0</div>

<div id="leaderboard">
<h3>Leaderboard</h3>
<ol id="scores"></ol>
<input id="playerName" placeholder="Nom">
<button onclick="saveScore()">Save</button>
</div>

</div>

<script>

// ===== GENERATION RANGES =====
const generations={
1:[1,151],
2:[152,251],
3:[252,386],
4:[387,493],
5:[494,649],
6:[650,721],
7:[722,809],
8:[810,905],
9:[906,1025]
}

// ===== STATE =====
let currentPokemon=null
let score=0
let streak=0
let revealInterval=null
let timerInterval=null
let timeLeft=30

// ===== SPRITE URL =====
function getSprite(id){
return `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${id}.png`
}

// ===== GENERATION SELECTOR =====
function initGenSelector(){

const container=document.getElementById("genSelector")

for(let g=1;g<=9;g++){

const label=document.createElement("label")
label.className="genBox"

label.innerHTML=`<input type="checkbox" value="${g}" checked> Gen ${g}`

container.appendChild(label)

}

}

function getSelectedGenerations(){

const checked=[...document.querySelectorAll("#genSelector input:checked")]

return checked.map(c=>parseInt(c.value))

}

function getRandomPokemon(){

const gens=getSelectedGenerations()

let pool=[]

gens.forEach(g=>{

const range=generations[g]

for(let i=range[0];i<=range[1];i++){
 pool.push(i)
}

})

return pool[Math.floor(Math.random()*pool.length)]

}

// ===== TIMER =====
function startTimer(){

clearInterval(timerInterval)

if(!document.getElementById("chrono").checked){
 document.getElementById("timer").textContent=""
 return
}

 timeLeft=30
 document.getElementById("timer").textContent=`⏱ ${timeLeft}s`

 timerInterval=setInterval(()=>{

 timeLeft--

 document.getElementById("timer").textContent=`⏱ ${timeLeft}s`

 if(timeLeft<=0){

 clearInterval(timerInterval)

 document.getElementById("result").textContent="Temps écoulé"

 nextPokemon()

 }

 },1000)

}

// ===== LOAD POKEMON =====
async function nextPokemon(){

clearInterval(revealInterval)

const id=getRandomPokemon()

const species=await fetch(`https://pokeapi.co/api/v2/pokemon-species/${id}`)
const data=await species.json()

const names={}

data.names.forEach(n=>{
 names[n.language.name]=n.name.toLowerCase()
})

currentPokemon={id,names}

const sprite=document.getElementById("sprite")

sprite.src=getSprite(id)

sprite.style.filter="brightness(0)"

if(document.getElementById("progressive").checked){

let level=0

revealInterval=setInterval(()=>{

level+=0.1

sprite.style.filter=`brightness(${level})`

if(level>=1) clearInterval(revealInterval)

},1000)

}

startTimer()

}

// ===== CHECK ANSWER =====
function checkAnswer(){

const guess=document.getElementById("guess").value.toLowerCase().trim()

const lang=document.getElementById("language").value

const correct=currentPokemon.names[lang]

const sprite=document.getElementById("sprite")

sprite.style.filter="brightness(1)"

if(guess===correct){

score++
streak++

}else{

streak=0

}

 document.getElementById("result").textContent=`${correct}`
 document.getElementById("score").textContent=`Score: ${score}`
 document.getElementById("streak").textContent=`Streak: ${streak}`

}

// ===== ENTER KEY =====

document.getElementById("guess").addEventListener("keydown",e=>{
 if(e.key==="Enter") checkAnswer()
})

// ===== LEADERBOARD =====
function loadScores(){

const list=document.getElementById("scores")

list.innerHTML=""

const scores=JSON.parse(localStorage.getItem("pokemonScores")||"[]")

scores.sort((a,b)=>b.score-a.score)

scores.slice(0,10).forEach(s=>{

const li=document.createElement("li")

li.textContent=`${s.name} - ${s.score}`

list.appendChild(li)

})

}

function saveScore(){

const name=document.getElementById("playerName").value||"Player"

const scores=JSON.parse(localStorage.getItem("pokemonScores")||"[]")

scores.push({name,score})

localStorage.setItem("pokemonScores",JSON.stringify(scores))

loadScores()

}

// ===== INIT =====

initGenSelector()
loadScores()
nextPokemon()

</script>

</body>
</html>
